<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="sun" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#ffe9b0"/>
      <stop offset="55%" stop-color="#ffc35c"/>
      <stop offset="100%" stop-color="#ff8a2a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb347" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffb347" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- deep-space disc -->
  <circle cx="16" cy="16" r="16" fill="#020208"/>

  <!-- a few stars -->
  <circle cx="7" cy="7.5" r="0.9" fill="#dbe4f5" opacity="0.9"/>
  <circle cx="25.5" cy="6" r="0.7" fill="#dbe4f5" opacity="0.7"/>
  <circle cx="23" cy="26.5" r="0.8" fill="#dbe4f5" opacity="0.8"/>
  <circle cx="5.5" cy="22" r="0.6" fill="#dbe4f5" opacity="0.6"/>

  <!-- solar glow -->
  <circle cx="16" cy="16" r="11" fill="url(#glow)"/>

  <!-- orbit, tilted like the scene's perspective -->
  <ellipse cx="16" cy="16" rx="13" ry="5.2" fill="none"
           stroke="#8caee6" stroke-width="1.1" stroke-opacity="0.55"
           transform="rotate(-18 16 16)"/>

  <!-- the sun -->
  <circle cx="16" cy="16" r="5.6" fill="url(#sun)"/>

  <!-- accent-blue planet riding the orbit's front arc -->
  <circle cx="25.4" cy="19.4" r="2.3" fill="#6fa8ff"/>
  <circle cx="24.6" cy="18.6" r="0.8" fill="#a8c8ff"/>
</svg>
